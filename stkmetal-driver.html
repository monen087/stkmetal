<style>
:root {
  --bg: #0a1628; --bg2: #0f2040; --bg3: #162a52;
  --green: #90caf9; --green2: #1e90ff; --green-pale: #0d2a4a; --green-soft: #1a3a6a;
  --amber: #ffd166; --amber-pale: #2a2000;
  --red: #ef5350; --red-pale: #2a0f0f;
  --text: #ffffff; --text2: #e0f0ff; --text3: #7ab0d4;
  --border: #1a3a5c; --border2: #2a5080;
  --radius: 14px; --radius-sm: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }

.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px; position: sticky; top: 0; z-index: 100; }
.header-title { font-size: 17px; font-weight: 700; }
.header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

.main { padding: 14px 14px 40px; }

/* Progress */
.prog-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.prog-label { font-size: 13px; color: var(--text2); }
.prog-count { font-size: 20px; font-weight: 700; color: var(--green2); }
.prog-bar { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.4s; }

/* Step card */
.step-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s; }
.step-card.done { border-color: var(--green-soft); }
.step-card.active { border-color: var(--amber); }
.step-header { display: flex; align-items: center; gap: 12px; padding: 14px; cursor: pointer; }
.step-header:active { background: var(--bg3); }
.step-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.icon-pickup { background: var(--amber-pale); }
.icon-deliver { background: var(--green-pale); }
.icon-done { background: var(--green-soft); }
.step-info { flex: 1; min-width: 0; }
.step-title { font-size: 15px; font-weight: 600; }
.step-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.step-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; flex-shrink: 0; }
.badge-wait { background: var(--bg3); color: var(--text3); }
.badge-active { background: var(--amber-pale); color: var(--amber); }
.badge-done { background: var(--green-pale); color: var(--green2); }

.step-body { display: none; border-top: 1px solid var(--border); }
.step-body.open { display: block; }
.step-section { padding: 14px; }
.sec-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }

/* Map link */
.map-btn { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--green2); font-size: 14px; font-weight: 500; text-decoration: none; margin-bottom: 12px; }
.map-btn:active { opacity: 0.75; }

/* Items */
.item-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.item-row:last-child { border: none; }
.item-name { flex: 1; font-size: 13px; color: var(--text2); }
.item-qty { font-size: 13px; font-weight: 600; color: var(--amber); }

/* Check items */
.check-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); margin-bottom: 6px; cursor: pointer; -webkit-user-select: none; user-select: none; }
.check-item:active { transform: scale(0.98); }
.check-item.checked { background: var(--green-pale); border-color: var(--green-soft); }
.check-item.checked .check-text { color: var(--text3); text-decoration: line-through; }
.checkbox { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border2); background: var(--bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; transition: all 0.12s; }
.check-item.checked .checkbox { background: var(--green); border-color: var(--green); color: white; }
.check-text { font-size: 14px; line-height: 1.45; }

/* Photo */
.photo-section { margin: 10px 0; }
.photo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.photo-thumb-wrap { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: var(--bg3); }
.photo-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
.photo-remove { position: absolute; top: 3px; right: 3px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,0.6); color: white; border: none; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.photo-add { aspect-ratio: 1; border-radius: 8px; border: 1.5px dashed var(--border2); background: var(--bg3); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; gap: 4px; }
.photo-add span { font-size: 11px; color: var(--text3); }
.photo-input { display: none; }

/* Confirm btn */
.confirm-btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 12px; transition: all 0.15s; }
.confirm-btn:active { transform: scale(0.97); }
.btn-inactive { background: var(--bg3); color: var(--text3); cursor: not-allowed; }
.btn-ready { background: var(--green); color: #fff; }
.btn-done { background: var(--green-pale); color: var(--green2); cursor: default; }

.btn-problem { background: var(--red-pale); color: var(--red); border: 1px solid var(--red); border-radius: var(--radius-sm); width: 100%; padding: 12px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 8px; }
.btn-problem:active { opacity: 0.8; }
.btn-has-problem { background: var(--red-pale); color: var(--red); cursor: default; }

/* Problem modal */
.problem-option { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); margin-bottom: 8px; cursor: pointer; }
.problem-option:active { background: var(--red-pale); border-color: var(--red); }
.problem-option.selected { background: var(--red-pale); border-color: var(--red); }
.problem-option-icon { font-size: 20px; }
.problem-option-text { font-size: 14px; }

/* Tel */
.tel-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text2); font-size: 13px; text-decoration: none; margin-bottom: 10px; }
.loading { text-align: center; padding: 60px 20px; color: var(--text3); }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 60px 20px; }
.empty-icon { font-size: 56px; margin-bottom: 14px; }
.empty-text { font-size: 16px; font-weight: 600; color: var(--text2); }
.empty-sub { font-size: 13px; color: var(--text3); margin-top: 6px; }

/* Toast */
.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-10px); background: var(--bg3); color: var(--text); border: 1px solid var(--border2); padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.25s; z-index: 300; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.prog-mini { height: 4px; background: var(--bg3); border-radius: 2px; margin: 8px 0; overflow: hidden; }
.prog-mini-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.25s; }
</style>

let driverLang = 'th';
let _itemTranslations = {}; // cache การแปล
let _isTranslating = false;

window.toggleDriverLang = async function() {
  driverLang = driverLang === 'th' ? 'mm' : 'th';
  const btn = document.getElementById('driver-lang-btn');
  btn.textContent = driverLang === 'th' ? '🇹🇭' : '🇲🇲';

  if (driverLang === 'mm' && plan) {
    // รวบรวมชื่อสินค้าทั้งหมดที่ยังไม่ได้แปล
    const allItems = new Set();
    (plan.pickups||[]).forEach(pk => (pk.items||[]).forEach(it => { if(it.name && !_itemTranslations[it.name]) allItems.add(it.name); }));
    (plan.customers||[]).forEach(c => (c.items||[]).forEach(it => { if(it.name && !_itemTranslations[it.name]) allItems.add(it.name); }));

    if (allItems.size > 0 && !_isTranslating) {
      _isTranslating = true;
      btn.textContent = '⏳';
      btn.disabled = true;
      try {
        await translateItems([...allItems]);
      } catch(e) { console.error(e); }
      btn.textContent = '🇲🇲';
      btn.disabled = false;
      _isTranslating = false;
    }
  }
  render();
};

async function translateItems(items) {
  const prompt = `แปลชื่อสินค้าเหล็กและวัสดุอุตสาหกรรมต่อไปนี้จากภาษาไทยเป็นภาษาพม่า (Myanmar/Burmese) ให้ถูกต้องตามศัพท์เทคนิค ตอบเป็น JSON object เท่านั้น ไม่ต้องมีข้อความอื่น รูปแบบ: {"ชื่อไทย": "ชื่อพม่า"}

รายการ:
${items.map(i => `- ${i}`).join('\n')}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  const text = data.content?.[0]?.text || '{}';
  try {
    const clean = text.replace(/```json|```/g, '').trim();
    const translations = JSON.parse(clean);
    Object.assign(_itemTranslations, translations);
  } catch(e) { console.error('Parse error:', e); }
}

window.getItemName = function(name) {
  if (driverLang === 'mm' && _itemTranslations[name]) {
    return `${_itemTranslations[name]}<br><span style="font-size:11px;opacity:0.6">${name}</span>`;
  }
  return name;
};

window.getL = function(key) {
  return LANG_DRIVER[driverLang][key] || LANG_DRIVER.th[key] || key;
};

// checks จะดึงจาก LANG_DRIVER ตาม driverLang
function getPickupChecks() { return LANG_DRIVER[driverLang].checks; }
function getDeliverChecks() { return LANG_DRIVER[driverLang].checksDeliver; }

if (!planId) {
  document.getElementById('main').innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">ไม่พบแผนงาน</div><div class="empty-sub">กรุณาเปิดลิงก์จาก Line ที่ได้รับ</div></div>`;
} else {
  startListener();
}

function startListener() {
  onSnapshot(doc(db,'plans',planId), snap => {
    if (!snap.exists()) {
      document.getElementById('main').innerHTML = `<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">ไม่พบแผนงานนี้</div></div>`;
      return;
    }
    plan = { id: snap.id, ...snap.data() };
    updateHeader();
    render();
  }, err => {
    document.getElementById('main').innerHTML = `<div class="loading">❌ โหลดไม่ได้: ${err.message}</div>`;
  });
}

function updateHeader() {
  const months = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const [y,m,d] = (plan.date||'').split('-');
  const dateStr = d ? `${parseInt(d)} ${months[parseInt(m)]} ${parseInt(y)+543}` : '-';
  document.getElementById('header-title').textContent = `🚛 ${plan.truckName||'รถ'} — ${plan.driver||'คนขับ'}`;
  document.getElementById('header-sub').textContent = `แผนงาน ${dateStr}`;
}

function renderPhotos(photos, key, idx, type, isDone) {
  return photos.map((src,i)=>`
    <div class="photo-thumb-wrap">
      <img src="${src}" loading="lazy">
      ${!isDone?`<button class="photo-remove" onclick="removePhoto('${key}',${i},${idx},'${type}')">✕</button>`:''}
    </div>`).join('');
}

window.toggleStep = function(key) {
  openSteps[key] = !openSteps[key]; render();
};

window.toggleCheck = function(key, ci, total) {
  if (!localChecks[key]) localChecks[key] = Array(total).fill(false);
  localChecks[key][ci] = !localChecks[key][ci]; render();
};

window.addPhoto = function(key, input, idx, type) {
  const files = Array.from(input.files);
  let loaded = 0;
  showToast('⏳ กำลังบันทึกรูป...');
  files.forEach(file => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 400; // เล็กลงมากเพื่อให้บันทึกได้ครบ 6 รูป
      const scale = Math.min(1, maxW/img.width);
      canvas.width = img.width*scale;
      canvas.height = img.height*scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const data = canvas.toDataURL('image/jpeg', 0.4); // quality ต่ำลง
      URL.revokeObjectURL(url);
      savePhoto(key, idx, type, data, files.length, ++loaded);
    };
    img.onerror = () => { showToast('❌ โหลดรูปไม่สำเร็จ'); URL.revokeObjectURL(url); };
    img.src = url;
  });
};

async function savePhoto(key, idx, type, data, total, loaded) {
  try {
    if (type==='pickup') {
      // ดึงข้อมูลล่าสุดก่อน${getL('addPhoto')}
      const snap = await getDoc(doc(db,'plans',planId));
      const latest = snap.data();
      const photos = [...(latest.pickups[idx].photos||[]), data];
      const pickups = [...latest.pickups];
      pickups[idx] = {...pickups[idx], photos};
      await updateDoc(doc(db,'plans',planId), {pickups});
    } else {
      const snap = await getDoc(doc(db,'plans',planId));
      const latest = snap.data();
      const photos = [...(latest.customers[idx].photos||[]), data];
      const customers = [...latest.customers];
      customers[idx] = {...customers[idx], photos};
      await updateDoc(doc(db,'plans',planId), {customers});
    }
    if (loaded===total) showToast(`📷 บันทึก ${total} รูปแล้ว`);
  } catch(e) {
    showToast('❌ รูปใหญ่เกินไป ลองถ่ายรูปใหม่');
    console.error(e);
  }
}

window.removePhoto = async function(key, photoIdx, idx, type) {
  if (!confirm('ลบรูปนี้?')) return;
  try {
    const snap = await getDoc(doc(db,'plans',planId));
    const latest = snap.data();
    if (type==='pickup') {
      const photos = [...(latest.pickups[idx].photos||[])];
      photos.splice(photoIdx, 1);
      const pickups = [...latest.pickups];
      pickups[idx] = {...pickups[idx], photos};
      await updateDoc(doc(db,'plans',planId), {pickups});
    } else {
      const photos = [...(latest.customers[idx].photos||[])];
      photos.splice(photoIdx, 1);
      const customers = [...latest.customers];
      customers[idx] = {...customers[idx], photos};
      await updateDoc(doc(db,'plans',planId), {customers});
    }
    showToast('🗑 ลบรูปแล้ว');
  } catch(e) {
    showToast('❌ ลบไม่สำเร็จ');
  }
};

window.undoConfirm = async function(type, idx) {
  if (!confirm('ยกเลิกการยืนยัน/แจ้งปัญหานี้?')) return;
  try {
    if (type==='pickup') {
      const pickups = [...plan.pickups];
      pickups[idx] = {...pickups[idx], done:false, doneAt:null, problem:null, problemNote:null, problemAt:null};
      await updateDoc(doc(db,'plans',planId), {pickups});
    } else {
      const customers = [...plan.customers];
      customers[idx] = {...customers[idx], done:false, doneAt:null, problem:null, problemNote:null, problemAt:null};
      await updateDoc(doc(db,'plans',planId), {customers});
    }
    showToast('↩️ ยกเลิกแล้ว');
  } catch(e) {
    showToast('❌ ยกเลิกไม่สำเร็จ');
  }
};

window.confirmPickup = async function(idx) {
  const pickups = [...plan.pickups];
  pickups[idx] = {...pickups[idx], done:true, doneAt: Date.now()};
  await updateDoc(doc(db,'plans',planId), {pickups});
  openSteps[`pickup-${idx}`] = false;
  showToast('✅ บันทึกการรับของแล้ว');
};

window.confirmDelivery = async function(idx) {
  const customers = [...plan.customers];
  customers[idx] = {...customers[idx], done:true, doneAt: Date.now()};
  await updateDoc(doc(db,'plans',planId), {customers});
  openSteps[`cust-${idx}`] = false;
  showToast('✅ บันทึกการส่งสินค้าแล้ว');
};

  document.getElementById('problem-modal').style.display = 'none';
};

window.submitProblem = async function() {
  if (!_selectedProblem) { showToast('⚠️ กรุณาเลือกสาเหตุ'); return; }
  const note = document.getElementById('problem-note-input').value.trim();
  try {
    if (_problemType === 'pickup') {
      const pickups = [...plan.pickups];
      pickups[_problemIdx] = {...pickups[_problemIdx], problem: _selectedProblem, problemNote: note, problemAt: Date.now()};
      await updateDoc(doc(db,'plans',planId), {pickups});
    } else {
      const customers = [...plan.customers];
      customers[_problemIdx] = {...customers[_problemIdx], problem: _selectedProblem, problemNote: note, problemAt: Date.now()};
      await updateDoc(doc(db,'plans',planId), {customers});
    }
    closeProblemModal();
    showToast('${getL('problemDone')}');
  } catch(e) {
    showToast('❌ บันทึกไม่สำเร็จ');
  }
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
