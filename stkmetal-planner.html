<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STK Metal — จัดแผนงาน</title>
<style>
:root {
  --bg:#0a1628;--bg2:#0f2040;--bg3:#162a52;--bg4:#1e3464;
  --blue:#1e90ff;--text:#fff;--text2:#e0f0ff;--text3:#7ab0d4;
  --border:#1a3a5c;--border2:#2a5080;--green-pale:#0d2a4a;
  --amber:#ffd166;--red:#ef5350;--red-pale:#2a0f0f;--r:10px;--rs:7px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Tahoma,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
/* HEADER */
.hd{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-size:16px;font-weight:700;color:var(--text2);}
.logo span{color:var(--blue);}
.hd-btns{display:flex;gap:8px;}
.btn{padding:7px 13px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;}
.btn:hover{background:var(--bg4);}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600;}
.btn.danger{color:var(--red);}
/* LAYOUT */
.layout{flex:1;display:grid;grid-template-columns:300px 1fr;overflow:hidden;}
/* LEFT */
.left{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel-hd{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:13px;font-weight:700;color:var(--text2);}
.badge{font-size:11px;background:var(--bg3);color:var(--text3);padding:1px 8px;border-radius:20px;}
.search{padding:8px;border-bottom:1px solid var(--border);}
.search input{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;}
.search input:focus{outline:none;border-color:var(--blue);}
.bank-list{flex:1;overflow-y:auto;padding:8px;}
.bitem{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px;margin-bottom:5px;cursor:grab;position:relative;user-select:none;}
.bitem:hover{border-color:var(--border2);background:var(--bg4);}
.bitem.used{opacity:0.4;cursor:not-allowed;border-style:dashed;}
.bitem.dragging{opacity:0.3;}
.bitem-name{font-size:13px;font-weight:600;color:var(--text);}
.bitem-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.bitem-badge{position:absolute;top:7px;right:8px;font-size:10px;background:var(--green-pale);color:var(--blue);padding:1px 6px;border-radius:8px;}
.add-btn{margin:8px;padding:9px;border:1px dashed var(--border2);border-radius:var(--rs);background:transparent;color:var(--text3);font-size:13px;cursor:pointer;width:calc(100% - 16px);font-family:inherit;}
.add-btn:hover{background:var(--bg3);color:var(--text2);}
/* RIGHT */
.right{display:flex;flex-direction:column;overflow:hidden;}
.toolbar{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg2);flex-shrink:0;}
.toolbar label{font-size:13px;color:var(--text3);}
.date-inp{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;}
.trucks{flex:1;display:flex;gap:10px;padding:10px;overflow-x:auto;overflow-y:hidden;align-items:flex-start;}
.truck{width:270px;flex-shrink:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;max-height:100%;}
.truck-hd{padding:9px 11px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.truck-hd input{flex:1;background:transparent;border:none;color:var(--text);font-size:13px;font-weight:700;font-family:inherit;}
.truck-hd input:focus{outline:none;}
.truck-hd input::placeholder{color:var(--text3);}
.truck-del{padding:2px 6px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:13px;}
.truck-driver{padding:5px 11px;border-bottom:1px solid var(--border);background:transparent;}
.truck-driver input{width:100%;background:transparent;border:none;color:var(--text3);font-size:12px;font-family:inherit;}
.truck-driver input:focus{outline:none;color:var(--text2);}
.drop{flex:1;overflow-y:auto;padding:7px;min-height:150px;transition:background .15s;}
.drop.over{background:var(--green-pale);}
.drop-empty{display:flex;align-items:center;justify-content:center;height:80px;color:var(--text3);font-size:12px;}
.citem{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;margin-bottom:4px;position:relative;}
.citem-name{font-size:12px;font-weight:600;color:var(--text2);padding-right:18px;}
.citem-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.citem-del{position:absolute;top:7px;right:7px;width:16px;height:16px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:var(--text3);cursor:pointer;font-size:11px;line-height:1;padding:0;}
.citem-del:hover{background:var(--red-pale);color:var(--red);}
.truck-ft{padding:6px 11px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);text-align:center;flex-shrink:0;}
.add-truck{width:270px;flex-shrink:0;height:56px;border:2px dashed var(--border2);border-radius:var(--r);background:transparent;color:var(--text3);font-size:22px;cursor:pointer;}
.add-truck:hover{background:var(--bg2);color:var(--text2);}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:18px;}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-title{font-size:15px;font-weight:700;}
.modal-x{background:var(--bg3);border:none;color:var(--text3);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;}
.fg{margin-bottom:9px;}
.fg label{display:block;font-size:12px;color:var(--text3);margin-bottom:3px;}
.fg input,.fg textarea,.fg select{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;}
.fg textarea{resize:none;}
.fg input:focus,.fg textarea:focus{outline:none;border-color:var(--blue);}
.irow{display:flex;gap:5px;margin-bottom:5px;align-items:center;}
.irow .inp-name{flex:1;}
.irow .inp-qty{width:65px;flex:none;}
.irow select{width:90px;flex:none;padding:8px 4px;}
.irow .btn-x{padding:4px 8px;border:1px solid var(--border2);border-radius:var(--rs);background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;font-size:12px;flex:none;}
.add-row{width:100%;padding:7px;border:1px dashed var(--border2);border-radius:var(--rs);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;margin-bottom:10px;font-family:inherit;}
.save-btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
/* CONFIRM */
.summary{background:var(--bg3);border-radius:var(--rs);padding:12px;font-size:13px;line-height:1.8;white-space:pre-wrap;margin:10px 0;max-height:300px;overflow-y:auto;}
.cfm-btns{display:flex;gap:8px;margin-top:12px;}
.cfm-cancel{flex:1;padding:10px;background:var(--bg3);color:var(--text3);border:1px solid var(--border2);border-radius:var(--rs);font-size:13px;cursor:pointer;font-family:inherit;}
/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);padding:9px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;z-index:400;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Map popup styles -->
<style>
.map-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;}
.map-overlay.show{display:flex;}
.map-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:860px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.map-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.map-title{font-size:14px;font-weight:700;color:var(--text2);}
.map-x{background:var(--bg3);border:none;color:var(--text3);padding:4px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px;}
.map-body{display:grid;grid-template-columns:1fr 260px;flex:1;overflow:hidden;min-height:0;}
#leaflet-map{flex:1;min-height:400px;}
.map-sidebar{border-left:1px solid var(--border);overflow-y:auto;padding:10px;}
.map-stop{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;margin-bottom:6px;}
.map-stop-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:700;margin-right:6px;flex-shrink:0;}
.map-stop-name{font-size:12px;font-weight:600;color:var(--text2);}
.map-stop-dist{font-size:11px;color:var(--amber);margin-top:3px;}
.map-total{background:var(--green-pale);border:1px solid var(--border2);border-radius:var(--rs);padding:8px 10px;text-align:center;font-size:13px;font-weight:700;color:var(--blue);margin-top:8px;}
.map-btn{width:100%;padding:8px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;margin-top:6px;}
.map-btn:hover{background:var(--bg4);}
.map-loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:13px;gap:8px;}
.map-geocode-note{font-size:10px;color:var(--text3);margin-top:6px;line-height:1.5;}
</style>
</head>
<body>

<div class="hd">
  <div class="logo">🔩 STK Metal — <span>จัดแผนงาน</span></div>
  <div class="hd-btns">
    <button class="btn" onclick="window.open('stkmetal-manager.html','_blank')">📋 ผู้จัดการ</button>
    <button class="btn primary" onclick="confirmSave()">💾 บันทึกทั้งหมด</button>
  </div>
</div>

<div class="layout">
  <!-- คลังงาน -->
  <div class="left">
    <div class="panel-hd">
      <span class="panel-title">📦 คลังงาน</span>
      <span class="badge" id="bank-count">0</span>
    </div>
    <div class="search">
      <input type="text" placeholder="🔍 ค้นหาลูกค้า..." oninput="renderBank(this.value)" id="search-inp">
    </div>
    <div class="bank-list" id="bank-list"></div>
    <button class="add-btn" onclick="openAdd()">+ เพิ่มลูกค้าใหม่ในคลัง</button>
  </div>

  <!-- แผนงาน -->
  <div class="right">
    <div class="toolbar">
      <label>📅 วันที่ส่ง:</label>
      <input class="date-inp" type="date" id="plan-date">
      <button class="btn danger" style="margin-left:auto" onclick="clearAll()">🗑 ล้างแผน</button>
    </div>
    <div class="trucks" id="trucks">
      <button class="add-truck" id="add-truck-btn" onclick="addTruck()">+</button>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="add-overlay">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title" id="modal-ttl">➕ เพิ่มลูกค้า</span>
      <button class="modal-x" onclick="closeAdd()">✕ ปิด</button>
    </div>
    <div class="fg"><label>ชื่อลูกค้า / บริษัท *</label><input id="m-name" placeholder="ชื่อบริษัท..."></div>
    <div class="fg"><label>เบอร์โทร</label><input id="m-tel" type="tel" placeholder="08xxxxxxxx"></div>
    <div class="fg"><label>📍 โลเคชั่น</label><input id="m-loc" placeholder="https://maps.app.goo.gl/..."></div>
    <div class="fg"><label>📝 Note</label><textarea id="m-note" rows="2" placeholder="หมายเหตุ..."></textarea></div>
    <div class="fg"><label>รายการสินค้า</label></div>
    <div id="m-items"></div>
    <button class="add-row" onclick="addRow()">+ เพิ่มสินค้า</button>
    <button class="save-btn" onclick="saveItem()">💾 บันทึก</button>
  </div>
</div>

<!-- Confirm Modal -->
<div class="overlay" id="cfm-overlay">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title">📋 ยืนยันบันทึก</span>
      <button class="modal-x" onclick="document.getElementById('cfm-overlay').classList.remove('show')">✕</button>
    </div>
    <div class="summary" id="cfm-summary"></div>
    <div class="cfm-btns">
      <button class="cfm-cancel" onclick="document.getElementById('cfm-overlay').classList.remove('show')">ยกเลิก</button>
      <button class="save-btn" id="cfm-btn" onclick="doSave()">✅ บันทึกเข้าระบบ</button>
    </div>
  </div>
</div>

<!-- Map Popup -->
<div class="map-overlay" id="map-overlay">
  <div class="map-box">
    <div class="map-hd">
      <span class="map-title" id="map-title">🗺️ แผนที่เส้นทาง</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="map-status" style="font-size:11px;color:var(--text3)"></span>
        <button class="map-x" onclick="closeMap()">✕ ปิด</button>
      </div>
    </div>
    <div class="map-body">
      <div id="leaflet-map"></div>
      <div class="map-sidebar" id="map-sidebar">
        <div class="map-loading">⏳ กำลังโหลด...</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
// พิกัดสำคัญ
var STK_ORIGIN = { lat: 13.7052, lng: 100.0236, name: 'STK Metal (สำนักงาน)', url: 'https://share.google/G2JSOzzzXm8OE5DE4' };
var BRANCH_COORDS = { lat: 13.6878, lng: 100.0156, name: 'สาขาใหญ่ (รับสินค้า)', url: 'https://share.google/PsXOyJMknK7rzlI0g' };

var bank = JSON.parse(localStorage.getItem('stk-bank2') || '[]');
var trucks = [];
var truckN = 0;
var editId = null;
var dragId = null;

// ===== INIT =====
document.getElementById('plan-date').value = new Date().toISOString().split('T')[0];
addTruck();
renderBank('');

// ===== TOAST =====
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// ===== BANK =====
function saveBank() { localStorage.setItem('stk-bank2', JSON.stringify(bank)); }

function renderBank(filter) {
  var list = document.getElementById('bank-list');
  var fl = (filter||'').toLowerCase();
  var shown = bank.filter(function(b){ return !fl || b.name.toLowerCase().indexOf(fl) >= 0; });
  document.getElementById('bank-count').textContent = bank.length + ' รายการ';
  if (!shown.length) {
    list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">' + (fl ? 'ไม่พบ' : 'ยังไม่มีลูกค้า') + '</div>';
    return;
  }
  var html = '';
  shown.forEach(function(item) {
    var used = trucks.filter(function(t){ return t.custs.some(function(c){ return c.bid === item.id; }); }).map(function(t){ return t.name; });
    var isUsed = used.length > 0;
    html += '<div class="bitem' + (isUsed?' used':'') + '" id="bi-' + item.id + '" draggable="' + (!isUsed) + '" ondragstart="dStart(event,\'' + item.id + '\')" ondragend="dEnd()" onclick="' + (isUsed?'':'openEdit(\''+item.id+'\')') + '">'
      + '<div class="bitem-name">' + esc(item.name) + '</div>'
      + '<div class="bitem-sub">' + (item.tel ? '📞' + item.tel + ' • ' : '') + item.items.length + ' สินค้า</div>'
      + (isUsed ? '<div class="bitem-badge">✓ ' + used.join(',') + '</div>' : '')
      + '</div>';
  });
  list.innerHTML = html;
}

// ===== ADD/EDIT =====
function openAdd() {
  editId = null;
  document.getElementById('modal-ttl').textContent = '➕ เพิ่มลูกค้าใหม่';
  document.getElementById('m-name').value = '';
  document.getElementById('m-tel').value = '';
  document.getElementById('m-loc').value = '';
  document.getElementById('m-note').value = '';
  document.getElementById('m-items').innerHTML = '';
  addRow(); addRow();
  document.getElementById('add-overlay').classList.add('show');
}

function openEdit(id) {
  var item = bank.find(function(b){ return b.id === id; });
  if (!item) return;
  editId = id;
  document.getElementById('modal-ttl').textContent = '✏️ แก้ไขลูกค้า';
  document.getElementById('m-name').value = item.name;
  document.getElementById('m-tel').value = item.tel || '';
  document.getElementById('m-loc').value = item.location || '';
  document.getElementById('m-note').value = item.note || '';
  document.getElementById('m-items').innerHTML = '';
  item.items.forEach(function(it){ addRow(it); });
  document.getElementById('add-overlay').classList.add('show');
}

function closeAdd() { document.getElementById('add-overlay').classList.remove('show'); }

function addRow(prefill) {
  var c = document.getElementById('m-items');
  var div = document.createElement('div');
  div.className = 'irow';
  var src = (prefill && prefill.src) ? prefill.src : 'สาขาใหญ่';
  var srcVal = (src === 'สาขาใหญ่' || src === 'ในสต้อค') ? src : 'อื่นๆ';
  div.innerHTML = '<input class="inp-name" placeholder="ชื่อสินค้า" value="' + esc(prefill ? prefill.name : '') + '">'
    + '<input class="inp-qty" placeholder="จำนวน" value="' + esc(prefill ? prefill.qty : '') + '">'
    + '<select onchange="chkSrc(this)">'
    + '<option value="สาขาใหญ่"' + (srcVal==='สาขาใหญ่'?' selected':'') + '>สาขาใหญ่</option>'
    + '<option value="ในสต้อค"' + (srcVal==='ในสต้อค'?' selected':'') + '>ในสต้อค</option>'
    + '<option value="อื่นๆ"' + (srcVal==='อื่นๆ'?' selected':'') + '>อื่นๆ</option>'
    + '</select>'
    + (srcVal==='อื่นๆ' ? '<input style="width:80px;flex:none;padding:8px 6px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:12px;font-family:inherit" value="' + esc(src) + '">' : '')
    + '<button class="btn-x" onclick="this.parentElement.remove()">✕</button>';
  c.appendChild(div);
}

function chkSrc(sel) {
  var row = sel.parentElement;
  var existing = row.querySelectorAll('input')[2];
  if (sel.value === 'อื่นๆ') {
    if (!existing) {
      var inp = document.createElement('input');
      inp.style.cssText = 'width:80px;flex:none;padding:8px 6px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg3);color:var(--text);font-size:12px;font-family:inherit';
      inp.placeholder = 'ระบุ...';
      sel.after(inp);
    }
  } else {
    if (existing) existing.remove();
  }
}

function saveItem() {
  var name = document.getElementById('m-name').value.trim();
  if (!name) { toast('⚠️ กรุณาใส่ชื่อลูกค้า'); return; }
  var items = [];
  document.querySelectorAll('#m-items .irow').forEach(function(row) {
    var inps = row.querySelectorAll('input');
    var n = inps[0] ? inps[0].value.trim() : '';
    var q = inps[1] ? inps[1].value.trim() : '';
    var sel = row.querySelector('select');
    var srcInp = inps[2];
    var src = sel ? (sel.value === 'อื่นๆ' ? (srcInp ? srcInp.value.trim() : 'อื่นๆ') : sel.value) : 'สาขาใหญ่';
    if (n) items.push({ name: n, qty: q || '-', src: src });
  });
  var data = {
    id: editId || 'b' + Date.now(),
    name: name,
    tel: document.getElementById('m-tel').value.trim(),
    location: document.getElementById('m-loc').value.trim(),
    note: document.getElementById('m-note').value.trim(),
    items: items
  };
  if (editId) {
    var idx = bank.findIndex(function(b){ return b.id === editId; });
    if (idx >= 0) bank[idx] = data;
  } else {
    bank.push(data);
  }
  saveBank(); renderBank(document.getElementById('search-inp').value); closeAdd();
  toast(editId ? '✅ แก้ไขแล้ว' : '✅ เพิ่มในคลังแล้ว');
}

// ===== TRUCKS =====
function addTruck() {
  truckN++;
  var t = { id: 't' + Date.now(), name: 'คันที่ ' + truckN, driver: '', custs: [] };
  trucks.push(t);
  renderTrucks();
}

function delTruck(id) {
  if (!confirm('ลบคันนี้?')) return;
  trucks = trucks.filter(function(t){ return t.id !== id; });
  renderTrucks(); renderBank(document.getElementById('search-inp').value);
}

function renderTrucks() {
  var container = document.getElementById('trucks');
  var addBtn = document.getElementById('add-truck-btn');
  container.querySelectorAll('.truck').forEach(function(el){ el.remove(); });
  trucks.forEach(function(t) {
    var div = document.createElement('div');
    div.className = 'truck';
    // สร้าง branch pickup HTML
    var branchItems = [];
    if (t.hasBranch) {
      t.custs.forEach(function(c) {
        c.items.forEach(function(it) {
          if (it.src === 'สาขาใหญ่') branchItems.push({ name: it.name, qty: it.qty, from: c.name });
        });
      });
    }
    var branchHtml = '';
    if (t.hasBranch) {
      branchHtml = '<div style="background:var(--green-pale);border:1px solid var(--border2);border-radius:var(--rs);padding:8px 10px;margin-bottom:5px">'
        + '<div style="font-size:12px;font-weight:700;color:var(--amber);margin-bottom:4px">📦 จุดรับ: สาขาใหญ่</div>';
      if (branchItems.length > 0) {
        branchItems.forEach(function(it) {
          branchHtml += '<div style="font-size:11px;color:var(--text2);padding:1px 0">• ' + esc(it.name) + ' = ' + esc(it.qty) + '</div>';
        });
      } else {
        branchHtml += '<div style="font-size:11px;color:var(--text3)">ยังไม่มีสินค้าจากสาขาใหญ่</div>';
      }
      branchHtml += '</div>';
    }

    var custs = t.custs.map(function(c, i) {
      return '<div class="citem">'
        + '<div class="citem-name">' + (i+1) + '. ' + esc(c.name) + '</div>'
        + '<div class="citem-sub">' + c.items.length + ' สินค้า' + (c.tel ? ' • 📞' + esc(c.tel) : '') + '</div>'
        + '<button class="citem-del" onclick="removeFromTruck(\'' + t.id + '\',\'' + c.bid + '\')">✕</button>'
        + '</div>';
    }).join('');
    div.innerHTML = '<div class="truck-hd">'
      + '<input value="' + esc(t.name) + '" placeholder="ชื่อรถ" onchange="updName(\'' + t.id + '\',this.value)">'
      + '<button class="truck-del" onclick="delTruck(\'' + t.id + '\')">✕</button>'
      + '</div>'
      + '<div class="truck-driver"><input value="' + esc(t.driver) + '" placeholder="ชื่อคนขับ..." onchange="updDriver(\'' + t.id + '\',this.value)"></div>'
      + '<div class="drop" id="drop-' + t.id + '" ondragover="dOver(event)" ondragleave="dLeave(event)" ondrop="dDrop(event,\'' + t.id + '\')">'
      + (t.custs.length ? custs : '<div class="drop-empty">ลากลูกค้ามาวางที่นี่</div>')
      + '</div>'
      + '<div class="truck-ft" style="display:flex;justify-content:space-between;align-items:center">'
      + '<span>' + t.custs.length + ' ลูกค้า</span>'
      + (t.custs.length >= 2 ? '<button class="map-btn" style="width:auto;padding:4px 10px;margin:0" onclick="showMap(\''+t.id+'\')">🗺️ ดูแผนที่</button>' : '')
      + '</div>';
    container.insertBefore(div, addBtn);
  });
}

function updName(id, v) { var t = trucks.find(function(t){ return t.id===id; }); if(t) t.name=v; }
function updDriver(id, v) { var t = trucks.find(function(t){ return t.id===id; }); if(t) t.driver=v; }

function removeFromTruck(tid, bid) {
  var t = trucks.find(function(t){ return t.id===tid; });
  if (t) t.custs = t.custs.filter(function(c){ return c.bid!==bid; });
  renderTrucks(); renderBank(document.getElementById('search-inp').value);
}

function toggleBranch(tid) {
  var t = trucks.find(function(t){ return t.id === tid; });
  if (!t) return;
  // ตรวจว่ามี branch แล้วหรือยัง
  if (t.hasBranch) {
    if (!confirm('ลบจุดรับสาขาใหญ่ออก?')) return;
    t.hasBranch = false;
  } else {
    t.hasBranch = true;
    toast('✅ เพิ่มจุดรับสาขาใหญ่แล้ว');
  }
  renderTrucks();
}

function clearAll() {
  if (!confirm('ล้างแผนงานทั้งหมด?')) return;
  trucks.forEach(function(t){ t.custs=[]; });
  renderTrucks(); renderBank(document.getElementById('search-inp').value);
}

// ===== DRAG & DROP =====
function dStart(e, id) {
  dragId = id;
  e.dataTransfer.effectAllowed = 'copy';
  setTimeout(function(){ var el=document.getElementById('bi-'+id); if(el) el.classList.add('dragging'); }, 0);
}
function dEnd() {
  if (dragId) { var el=document.getElementById('bi-'+dragId); if(el) el.classList.remove('dragging'); }
  dragId = null;
}
function dOver(e) { e.preventDefault(); e.currentTarget.classList.add('over'); }
function dLeave(e) { e.currentTarget.classList.remove('over'); }
function dDrop(e, tid) {
  e.preventDefault();
  e.currentTarget.classList.remove('over');
  if (!dragId) return;
  var item = bank.find(function(b){ return b.id===dragId; });
  if (!item) return;
  var t = trucks.find(function(t){ return t.id===tid; });
  if (!t) return;
  if (t.custs.some(function(c){ return c.bid===dragId; })) { toast('⚠️ มีลูกค้านี้อยู่แล้ว'); return; }
  t.custs.push({ bid: item.id, name: item.name, tel: item.tel, location: item.location, note: item.note, items: item.items });
  renderTrucks(); renderBank(document.getElementById('search-inp').value);
}

// ===== MAP =====
var leafletMap = null;

function closeMap() {
  document.getElementById('map-overlay').classList.remove('show');
}

// แปลง Google Maps URL → พิกัด (ดึงจาก URL ถ้าทำได้)
function extractCoords(url) {
  if (!url) return null;
  // รูปแบบ: @lat,lng หรือ query=lat,lng
  var m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  m = url.match(/query=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  m = url.match(/place\/[^/]+\/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  return null;
}

// geocode ด้วย Nominatim (fallback)
async function geocode(name) {
  try {
    var r = await fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(name + ' ประเทศไทย') + '&format=json&limit=1', {
      headers: { 'Accept-Language': 'th' }
    });
    var data = await r.json();
    if (data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), name: data[0].display_name };
  } catch(e) {}
  return null;
}

// คำนวณระยะทางเส้นตรง (Haversine)
function dist(a, b) {
  var R = 6371, dLat = (b.lat-a.lat)*Math.PI/180, dLon = (b.lng-a.lng)*Math.PI/180;
  var x = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

async function showMap(truckId) {
  var t = trucks.find(function(t){ return t.id === truckId; });
  if (!t || t.custs.length < 2) { toast('⚠️ ต้องมีลูกค้าอย่างน้อย 2 คน'); return; }

  document.getElementById('map-title').textContent = '🗺️ เส้นทาง — ' + t.name;
  document.getElementById('map-status').textContent = '⏳ กำลังโหลดแผนที่...';
  document.getElementById('map-sidebar').innerHTML = '<div class="map-loading">⏳ กำลังค้นหาพิกัด...</div>';
  document.getElementById('map-overlay').classList.add('show');

  // init map
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
  await new Promise(function(r){ setTimeout(r, 100); });
  leafletMap = L.map('leaflet-map').setView([13.7, 100.5], 10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 18
  }).addTo(leafletMap);

  // หาพิกัดแต่ละจุด
  var points = [];
  // จุดเริ่ม = STK Metal
  var origin = STK_ORIGIN;
  points.push(origin);

  // ถ้ามีสาขาใหญ่ให้เพิ่มเป็นจุดที่ 2
  if (t.hasBranch) {
    points.push(BRANCH_COORDS);
  }

  for (var i = 0; i < t.custs.length; i++) {
    var c = t.custs[i];
    var coords = extractCoords(c.location || '');
    if (!coords && c.name) {
      document.getElementById('map-status').textContent = '⏳ ค้นหา: ' + c.name;
      coords = await geocode(c.name);
    }
    points.push({
      lat: coords ? coords.lat : null,
      lng: coords ? coords.lng : null,
      name: c.name,
      tel: c.tel
    });
  }

  // วาดจุดและเส้นทาง
  var validPoints = points.filter(function(p){ return p.lat && p.lng; });
  var colors = ['#1e90ff','#ff6b35','#4caf50','#ffd166','#e040fb','#00bcd4','#ff5252','#69f0ae'];

  var bounds = [];
  validPoints.forEach(function(p, i) {
    var color = i === 0 ? '#4caf50' : colors[i % colors.length];
    var icon = L.divIcon({
      className: '',
      html: '<div style="width:28px;height:28px;border-radius:50%;background:' + color + ';border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;box-shadow:0 2px 4px rgba(0,0,0,.4)">' + (i === 0 ? '🏠' : i) + '</div>',
      iconSize: [28, 28], iconAnchor: [14, 14]
    });
    L.marker([p.lat, p.lng], { icon: icon }).addTo(leafletMap)
      .bindPopup('<b>' + (i===0?'จุดเริ่ม: ':i+'. ') + p.name + '</b>' + (p.tel ? '<br>📞 ' + p.tel : ''));
    bounds.push([p.lat, p.lng]);
  });

  // วาดเส้น
  if (validPoints.length >= 2) {
    var latlngs = validPoints.map(function(p){ return [p.lat, p.lng]; });
    L.polyline(latlngs, { color: '#1e90ff', weight: 3, opacity: 0.7, dashArray: '8,4' }).addTo(leafletMap);
    leafletMap.fitBounds(bounds, { padding: [30, 30] });
  }

  // สร้าง sidebar
  var totalDist = 0;
  var sideHtml = '';
  for (var i = 0; i < points.length; i++) {
    var p = points[i];
    var distStr = '';
    if (i > 0 && validPoints.length >= 2) {
      var prev = points[i-1];
      if (p.lat && p.lng && prev.lat && prev.lng) {
        var d = dist(prev, p);
        totalDist += d;
        distStr = '<div class="map-stop-dist">📏 จากจุดก่อนหน้า: ~' + d.toFixed(1) + ' กม. (เส้นตรง)</div>';
      }
    }
    var isOrigin = i === 0;
    sideHtml += '<div class="map-stop">'
      + '<div style="display:flex;align-items:center">'
      + '<span class="map-stop-num" style="background:' + (isOrigin?'#4caf50':'#1e90ff') + '">' + (isOrigin?'🏠':i) + '</span>'
      + '<span class="map-stop-name">' + esc(p.name) + '</span>'
      + '</div>'
      + (p.tel ? '<div style="font-size:11px;color:var(--text3);margin-top:2px">📞 ' + esc(p.tel) + '</div>' : '')
      + (!p.lat ? '<div style="font-size:10px;color:var(--red);margin-top:2px">⚠️ ไม่พบพิกัด</div>' : '')
      + distStr
      + '</div>';
  }
  if (totalDist > 0) {
    sideHtml += '<div class="map-total">📍 ระยะทางรวม ~' + totalDist.toFixed(1) + ' กม.</div>';
    sideHtml += '<div class="map-geocode-note">* ระยะทางเส้นตรง ระยะถนนจริงอาจมากกว่า 1.3-1.5 เท่า</div>';
  }
  // ปุ่มเปิดใน Google Maps
  var gmUrl = 'https://www.google.com/maps/dir/' + validPoints.map(function(p){ return p.lat+','+p.lng; }).join('/');
  sideHtml += '<a href="' + gmUrl + '" target="_blank"><button class="map-btn">🗺️ เปิดใน Google Maps</button></a>';

  document.getElementById('map-sidebar').innerHTML = sideHtml;
  document.getElementById('map-status').textContent = validPoints.length + '/' + points.length + ' จุดพบพิกัด';
  setTimeout(function(){ if(leafletMap) leafletMap.invalidateSize(); }, 200);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
