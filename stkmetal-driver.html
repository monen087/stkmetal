<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest-driver.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>STK Metal — คนขับ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a1628; --bg2: #0f2040; --bg3: #162a52;
  --green: #90caf9; --green2: #1e90ff; --green-pale: #0d2a4a; --green-soft: #1a3a6a;
  --amber: #ffd166; --amber-pale: #2a2000;
  --red: #ef5350; --red-pale: #2a0f0f;
  --text: #ffffff; --text2: #e0f0ff; --text3: #7ab0d4;
  --border: #1a3a5c; --border2: #2a5080;
  --radius: 14px; --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }

.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 16px; position: sticky; top: 0; z-index: 100; }
.header-row { display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 17px; font-weight: 700; }
.header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.lang-btn { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

.main { padding: 14px 14px 40px; }

.prog-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.prog-label { font-size: 13px; color: var(--text2); }
.prog-count { font-size: 20px; font-weight: 700; color: var(--green2); }
.prog-bar { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--green2); border-radius: 4px; transition: width 0.4s; }

.step-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s; }
.step-card.done { border-color: var(--green-soft); }
.step-card.active { border-color: var(--amber); }
.step-card.problem { border-color: var(--red); }
.step-header { display: flex; align-items: center; gap: 12px; padding: 14px; cursor: pointer; }
.step-header:active { background: var(--bg3); }
.step-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.icon-pickup { background: var(--amber-pale); }
.icon-deliver { background: var(--green-pale); }
.icon-done { background: var(--green-soft); }
.icon-problem { background: var(--red-pale); }
.step-info { flex: 1; min-width: 0; }
.step-title { font-size: 15px; font-weight: 600; }
.step-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.step-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; flex-shrink: 0; }
.badge-wait { background: var(--bg3); color: var(--text3); }
.badge-active { background: var(--amber-pale); color: var(--amber); }
.badge-done { background: var(--green-pale); color: var(--green2); }
.badge-problem { background: var(--red-pale); color: var(--red); }
.step-body { display: none; border-top: 1px solid var(--border); }
.step-body.open { display: block; }
.step-section { padding: 14px; }
.sec-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }

.map-btn { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--green2); font-size: 14px; font-weight: 500; text-decoration: none; margin-bottom: 12px; }
.tel-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text2); font-size: 13px; text-decoration: none; margin-bottom: 10px; }

.item-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.item-row:last-child { border: none; }
.item-name { flex: 1; font-size: 13px; color: var(--text2); }
.item-qty { font-size: 13px; font-weight: 600; color: var(--amber); }

.check-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); margin-bottom: 6px; cursor: pointer; -webkit-user-select: none; user-select: none; }
.check-item:active { transform: scale(0.98); }
.check-item.checked { background: var(--green-pale); border-color: var(--green-soft); }
.check-item.checked .check-text { color: var(--text3); }
.checkbox { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border2); background: var(--bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; transition: all 0.12s; }
.check-item.checked .checkbox { background: var(--green2); border-color: var(--green2); color: white; }
.check-text { font-size: 14px; line-height: 1.45; }

.sub-option { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); margin: 3px 0 3px 20px; cursor: pointer; }
.sub-option.selected { background: var(--green-pale); border-color: var(--green-soft); }
.sub-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
.sub-option.selected .sub-dot { background: var(--green2); border-color: var(--green2); color: #fff; }

.photo-section { margin: 10px 0; }
.photo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.photo-thumb-wrap { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: var(--bg3); }
.photo-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
.photo-remove { position: absolute; top: 3px; right: 3px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,0.6); color: white; border: none; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.photo-add { aspect-ratio: 1; border-radius: 8px; border: 1.5px dashed var(--border2); background: var(--bg3); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; gap: 4px; }
.photo-add span { font-size: 11px; color: var(--text3); }
.photo-input { display: none; }

.confirm-btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 12px; transition: all 0.15s; }
.btn-inactive { background: var(--bg3); color: var(--text3); cursor: not-allowed; }
.btn-ready { background: var(--green2); color: #fff; }
.btn-done { background: var(--green-pale); color: var(--green2); cursor: default; }
.btn-has-problem { background: var(--red-pale); color: var(--red); cursor: default; }
.btn-problem { width: 100%; padding: 11px; background: var(--red-pale); color: var(--red); border: 1px solid var(--red); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; cursor: pointer; margin-top: 8px; }
.btn-undo { width: 100%; padding: 10px; background: transparent; color: var(--text3); border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; cursor: pointer; margin-top: 6px; }

.prog-mini { height: 4px; background: var(--bg3); border-radius: 2px; margin: 8px 0; overflow: hidden; }
.prog-mini-fill { height: 100%; background: var(--green2); border-radius: 2px; transition: width 0.25s; }

.loading { text-align: center; padding: 60px 20px; color: var(--text3); }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green2); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 60px 20px; }
.empty-icon { font-size: 56px; margin-bottom: 14px; }
.empty-text { font-size: 16px; font-weight: 600; color: var(--text2); }
.empty-sub { font-size: 13px; color: var(--text3); margin-top: 6px; }

.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-10px); background: var(--bg3); color: var(--text); border: 1px solid var(--border2); padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.25s; z-index: 300; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Problem Modal */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.modal-box { background: var(--bg2); border-radius: 14px 14px 0 0; width: 100%; max-width: 480px; padding: 20px 16px calc(20px + env(safe-area-inset-bottom)); max-height: 85vh; overflow-y: auto; }
.problem-option { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); margin-bottom: 8px; cursor: pointer; }
.problem-option.selected { background: var(--red-pale); border-color: var(--red); }

/* Signature Modal */
.sig-canvas { width: 100%; height: 180px; background: #fff; border-radius: 8px; cursor: crosshair; touch-action: none; display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <div class="header-title" id="header-title">🔩 STK Metal</div>
      <div class="header-sub" id="header-sub">กำลังโหลด...</div>
    </div>
    <button class="lang-btn" id="lang-btn" onclick="toggleLang()">🇹🇭</button>
  </div>
</div>

<div class="main" id="main">
  <div class="loading"><div class="spinner"></div>กำลังโหลด...</div>
</div>

<div class="toast" id="toast"></div>

<!-- Problem Modal -->
<div class="modal-bg" id="problem-modal" style="display:none">
  <div class="modal-box">
    <div style="font-size:16px;font-weight:700;margin-bottom:4px">⚠️ แจ้งปัญหา</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:14px">เลือกสาเหตุของปัญหา</div>
    <div id="problem-options"></div>
    <div style="margin-top:10px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:4px">รายละเอียดเพิ่มเติม</div>
      <textarea id="problem-note" rows="2" placeholder="อธิบายเพิ่มเติม..." style="width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;resize:none"></textarea>
    </div>
    <button onclick="submitProblem()" style="width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px">⚠️ ยืนยันแจ้งปัญหา</button>
    <button onclick="closeProblemModal()" style="width:100%;padding:11px;background:transparent;color:var(--text3);border:1px solid var(--border2);border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;margin-top:6px">✕ ยกเลิก</button>
  </div>
</div>

<!-- Signature Modal -->
<div class="modal-bg" id="sig-modal" style="display:none">
  <div class="modal-box">
    <div style="font-size:16px;font-weight:700;margin-bottom:4px">✍️ ลายเซ็นลูกค้า</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:12px">กรุณาให้ลูกค้าเซ็นชื่อในกล่องด้านล่าง</div>
    <canvas id="sig-canvas" class="sig-canvas"></canvas>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button onclick="clearSig()" style="flex:1;padding:11px;background:var(--bg3);color:var(--text3);border:1px solid var(--border2);border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer">🗑 ล้าง</button>
      <button onclick="cancelSig()" style="flex:1;padding:11px;background:var(--bg3);color:var(--text3);border:1px solid var(--border2);border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer">✕ ยกเลิก</button>
      <button onclick="confirmSig()" style="flex:2;padding:11px;background:var(--green2);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer">✅ ยืนยัน</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, getDoc, getDocs, updateDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8FDKz4Zd8SnnqCviwPgPxuotKxT-4pTM",
  authDomain: "delivery-stkmetal.firebaseapp.com",
  projectId: "delivery-stkmetal",
  storageBucket: "delivery-stkmetal.firebasestorage.app",
  messagingSenderId: "245602225105",
  appId: "1:245602225105:web:247e531e379eebabdb6ef0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ---- State ----
const planId = new URLSearchParams(location.search).get('plan');
let plan = null;
let allPlans = [];
let localChecks = {};
let localSubChecks = {}; // {key: {method: 'person'|'equipment'}}
let openSteps = {};
let driverLang = 'th';
let _problemType = null;
let _problemIdx = null;
let _selectedProblem = null;
let _sigIdx = -1;
let _sigCtx = null;
let _sigDrawing = false;
let _sigLastX = 0;
let _sigLastY = 0;
let _sigHasDrawn = false;
let _photoCache = {}; // cache รูปจาก subcollection

// ---- Checklists ----
const PICKUP_CHECKS_TH = ['นับจำนวนสินค้าครบตามรายการ','ตรวจสภาพผิว ไม่มีรอยขีดข่วน/บุบ','ห่อกันรอยครบทุกชิ้น','ถ่ายรูปสินค้าก่อนขึ้นรถ'];
const PICKUP_CHECKS_MM = ['ကုန်ပစ္စည်အရေအတွက်စစ်ဆေးပြီး','မျက်နှာပြင်စစ်ဆေးပြီး','ထုပ်ပိုးမှုပြီးစီး','ကားပေါ်တင်မတင်မှီဓာတ်ပုံရိုက်ပြီး'];
const DELIVER_CHECKS_TH = ['สินค้าครบตามจำนวน','สินค้าสมบูรณ์ไม่มีรอย/คดงอ','ถ่ายรูปตอนลงสินค้า','ลงสินค้า','เอกสารให้ลูกค้าเซ็นเรียบร้อย'];
const DELIVER_CHECKS_MM = ['ကုန်ပစ္စည်အရေအတွက်ပြည့်ပြီး','ကုန်ပစ္စည်ကောင်းမွန်မမြင်ကြောင်း','ကုန်ချစဉ်ဓာတ်ပုံရိုက်ပြီး','ကုန်ချပြီး','စာရင်းလူကြီးလက်မှတ်ထိုးပြီး'];

const PROBLEMS_PICKUP_TH = [{e:'📦',t:'รับของไม่ครบ'},{e:'💥',t:'สินค้าเสียหาย'},{e:'🚫',t:'ไม่มีสินค้าให้รับ'},{e:'⏰',t:'รอนานเกินไป'},{e:'📝',t:'อื่นๆ'}];
const PROBLEMS_DELIVER_TH = [{e:'🚫',t:'ลูกค้าไม่รับสินค้า'},{e:'💥',t:'สินค้าเสียหาย'},{e:'📦',t:'ส่งของไม่ครบ'},{e:'📍',t:'หาสถานที่ไม่พบ'},{e:'📵',t:'ติดต่อลูกค้าไม่ได้'},{e:'📝',t:'อื่นๆ'}];
const PROBLEMS_PICKUP_MM = [{e:'📦',t:'ကုန်မပြည့်'},{e:'💥',t:'ကုန်ပျက်စီး'},{e:'🚫',t:'ကုန်မရှိ'},{e:'⏰',t:'အချိန်ကြာ'},{e:'📝',t:'အခြား'}];
const PROBLEMS_DELIVER_MM = [{e:'🚫',t:'ဖောက်သည်မလက်ခံ'},{e:'💥',t:'ကုန်ပျက်စီး'},{e:'📦',t:'ကုန်မပြည့်'},{e:'📍',t:'နေရာမတွေ့'},{e:'📵',t:'ဆက်သွယ်မရ'},{e:'📝',t:'အခြား'}];

function getPickupChecks() { return driverLang === 'mm' ? PICKUP_CHECKS_MM : PICKUP_CHECKS_TH; }
function getDeliverChecks() { return driverLang === 'mm' ? DELIVER_CHECKS_MM : DELIVER_CHECKS_TH; }

// ---- Language ----
window.toggleLang = () => {
  driverLang = driverLang === 'th' ? 'mm' : 'th';
  document.getElementById('lang-btn').textContent = driverLang === 'th' ? '🇹🇭' : '🇲🇲';
  if (plan) render();
  else renderAll();
};


// ---- Item Translation Dictionary ----
const ITEM_DICT = [
  ['ท่อเหลี่ยม','ပိုက်စတုဂံ'],['ท่อกลม','ပိုက်ဝိုင်း'],['ท่อแป','ပိုက်ပြားချပ်'],['ท่อ','ပိုက်'],
  ['เพลากลม','ရိုးစက်ဝိုင်း'],['เพลาแบน','ရိုးပြား'],['เพลา','ရိုး'],
  ['เส้นแบนซีด','ကြိုးပြားချပ်'],['เส้น','ကြိုး'],
  ['แผ่นเหล็ก','သံပြား'],['เหล็กแผ่น','သံပြား'],['แผ่น','ပြား'],
  ['ฉากรีด','ထောင့်မှန်ဆွဲ'],['ฉากเชื่อม','ထောင့်မှန်ဂဟေ'],['ฉาก','ထောင့်မှန်'],
  ['ข้องอ','ကွေးချိတ်'],['ข้อต่อ','ချိတ်ဆက်'],['ข้อ','ချိတ်'],
  ['หนาเต็ม','အထူပြည့်'],['หนา','အထူ'],['บาง','ပါး'],
  ['สแตนเลส','စတိန်းလက်စ်'],['เหล็ก','သံ'],
  ['กลม','ဝိုင်း'],['สี่เหลี่ยม','စတုဂံ'],['แบน','ပြား'],
  ['รีด','ဆွဲ'],['เชื่อม','ဂဟေ'],['ดำ','မည်း'],['ขาว','ဖြူ'],
  ['นิ้ว','လက်မ'],['สาขาใหญ่','ဌာနချုပ်'],['ในสต้อค','လှောင်ကုန်'],
];

function translateItem(name) {
  if (driverLang === 'th') return name;
  let result = name;
  for (const [th, mm] of ITEM_DICT) {
    result = result.split(th).join(mm);
  }
  return result;
}

function translateSrc(src) {
  if (!src) return '';
  if (driverLang === 'mm') {
    if (src === 'สาขาใหญ่') return 'ဌာနချုပ်';
    if (src === 'ในสต้อค') return 'လှောင်ကုန်';
  }
  // ถ้าเป็นไทย ให้แสดงค่าไทยเสมอ
  if (driverLang === 'th') {
    if (src === 'ဌာနချုပ်') return 'สาขาใหญ่';
    if (src === 'လှောင်ကုန်') return 'ในสต้อค';
  }
  return src;
}

// ---- Init ----
if (!planId) {
  startAllListener();
} else {
  startPlanListener();
}

// ---- All Plans Mode ----
function startAllListener() {
  document.getElementById('header-title').textContent = '🔩 STK Metal — งานของฉัน';
  document.getElementById('header-sub').textContent = 'งานที่ยังไม่เสร็จ';
  document.getElementById('main').innerHTML = '<div class="loading"><div class="spinner"></div>กำลังโหลด...</div>';
  const q = query(collection(db, 'plans'), orderBy('date', 'desc'));
  onSnapshot(q, snap => {
    allPlans = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
  }, err => {
    document.getElementById('main').innerHTML = '<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">โหลดไม่สำเร็จ</div><div class="empty-sub">'+err.message+'</div></div>';
  });
}

function renderAll() {
  const today = new Date().toISOString().split('T')[0];
  const months = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const fmt = d => { if(!d) return '-'; const [y,m,day]=d.split('-'); return parseInt(day)+' '+months[parseInt(m)]+' '+(parseInt(y)+543); };

  const pending = allPlans.filter(p => {
    if (!p.date || p.date > today) return false;
    const steps = [...(p.pickups||[]), ...(p.customers||[])];
    const total = steps.length;
    // นับงานที่ "เสร็จ" = done หรือ มีปัญหา (problem)
    const doneOrProblem = steps.filter(s => s.done || s.problem).length;
    return doneOrProblem < total;
  });

  if (!pending.length) {
    document.getElementById('main').innerHTML = '<div class="empty"><div class="empty-icon">🎉</div><div class="empty-text">ไม่มีงานค้างแล้ว!</div><div class="empty-sub">ทุกแผนงานเสร็จสิ้นแล้ว</div></div>';
    return;
  }

  let html = '<div style="font-size:12px;color:var(--text3);padding:8px 0;font-weight:600">📋 งานที่ยังไม่เสร็จ ('+pending.length+' แผนงาน)</div>';

  pending.forEach(p => {
    const total = (p.pickups||[]).length + (p.customers||[]).length;
    const done = (p.pickups||[]).filter(pk=>pk.done).length + (p.customers||[]).filter(c=>c.done).length;
    const pct = total ? Math.round(done/total*100) : 0;
    const isToday = p.date === today;
    const bc = isToday ? 'var(--green2)' : 'var(--border)';

    html += '<div style="background:var(--bg2);border:1px solid '+bc+';border-radius:14px;margin-bottom:10px;overflow:hidden">';
    html += '<div style="padding:12px 14px;border-bottom:1px solid var(--border)">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">';
    html += '<div style="font-size:14px;font-weight:700">🚛 '+(p.truckName||'รถ')+' — '+(p.driver||'-')+'</div>';
    html += '<span style="font-size:11px;padding:3px 8px;border-radius:20px;background:'+(isToday?'var(--green-pale)':'var(--amber-pale)')+';color:'+(isToday?'var(--green2)':'var(--amber)')+'">'+fmt(p.date)+'</span>';
    html += '</div>';
    html += '<div style="font-size:12px;color:var(--text3);margin-bottom:8px">'+done+'/'+total+' เสร็จ</div>';
    html += '<div style="height:5px;background:var(--bg3);border-radius:3px;overflow:hidden"><div style="height:100%;background:var(--green2);width:'+pct+'%"></div></div>';
    html += '</div>';
    html += '<div style="padding:10px 14px">';

    const pendingSteps = [
      ...(p.pickups||[]).map((pk,i)=>({...pk,label:'รับของจุดที่ '+(i+1)})).filter(s=>!s.done && !s.problem),
      ...(p.customers||[]).map((c,i)=>({...c,label:'ส่ง '+c.name})).filter(s=>!s.done && !s.problem)
    ];
    pendingSteps.slice(0,4).forEach(s => {
      html += '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">';
      html += '<div style="width:7px;height:7px;border-radius:50%;background:'+(s.problem?'var(--red)':'var(--text3)')+';flex-shrink:0"></div>';
      html += '<div style="flex:1;font-size:13px;color:var(--text2)">'+s.label+'</div>';
      if (s.problem) html += '<span style="font-size:11px;color:var(--red)">รอแก้ไข</span>';
      html += '</div>';
    });
    if (pendingSteps.length > 4) html += '<div style="font-size:12px;color:var(--text3);padding:5px 0;text-align:center">+ อีก '+(pendingSteps.length-4)+' รายการ</div>';

    const url = 'https://monen087.github.io/stkmetal/stkmetal-driver.html?plan='+p.id;
    html += '<a href="'+url+'" style="display:block;margin-top:10px;padding:12px;background:var(--green2);color:#fff;border-radius:var(--radius-sm);text-align:center;text-decoration:none;font-size:14px;font-weight:700">✅ เปิด Checklist ทำงาน</a>';
    html += '</div></div>';
  });

  document.getElementById('main').innerHTML = html;
}

// ---- Single Plan Mode ----
async function loadPhotos() {
  const photosSnap = await getDocs(collection(db,'plans',planId,'photos'));
  _photoCache = {};
  photosSnap.docs.forEach(d => {
    const p = d.data();
    const key = p.type+'-'+p.idx;
    if (!_photoCache[key]) _photoCache[key] = [];
    _photoCache[key].push({id: d.id, data: p.data, createdAt: p.createdAt});
  });
  // เรียงตาม createdAt
  Object.keys(_photoCache).forEach(k => {
    _photoCache[k].sort((a,b) => a.createdAt - b.createdAt);
  });
}

function getPhotos(type, idx) {
  return (_photoCache[type+'-'+idx] || []).map(p => p.data);
}

function startPlanListener() {
  // โหลดรูปก่อน แล้วค่อย listen plan
  loadPhotos().then(() => {
    // subscribe รูปใหม่ real-time
    onSnapshot(collection(db,'plans',planId,'photos'), snap => {
      _photoCache = {};
      snap.docs.forEach(d => {
        const p = d.data();
        const key = p.type+'-'+p.idx;
        if (!_photoCache[key]) _photoCache[key] = [];
        _photoCache[key].push({id: d.id, data: p.data, createdAt: p.createdAt});
      });
      Object.keys(_photoCache).forEach(k => { _photoCache[k].sort((a,b) => a.createdAt-b.createdAt); });
      if (plan) render();
    });
  });

  onSnapshot(doc(db,'plans',planId), snap => {
    if (!snap.exists()) {
      document.getElementById('main').innerHTML = '<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">ไม่พบแผนงาน</div></div>';
      return;
    }
    plan = { id: snap.id, ...snap.data() };
    const months = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const [y,m,d] = (plan.date||'').split('-');
    document.getElementById('header-title').textContent = '🚛 '+(plan.truckName||'รถ')+' — '+(plan.driver||'คนขับ');
    document.getElementById('header-sub').textContent = 'แผนงาน '+(d?parseInt(d)+' '+months[parseInt(m)]+' '+(parseInt(y)+543):'-');
    render();
  }, err => {
    document.getElementById('main').innerHTML = '<div class="loading">❌ '+err.message+'</div>';
  });
}

function render() {
  const pickups = plan.pickups||[];
  const customers = plan.customers||[];
  const total = pickups.length + customers.length;
  const done = pickups.filter(p=>p.done).length + customers.filter(c=>c.done).length;
  const pct = total ? Math.round(done/total*100) : 0;

  let html = '<div class="prog-card"><div class="prog-row"><div class="prog-label">ความคืบหน้าวันนี้</div><div class="prog-count">'+done+'/'+total+' <span style="font-size:13px;color:var(--text3)">รายการ</span></div></div><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>';

  // Pickups
  if (pickups.length) {
    html += '<div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:8px">📦 จุดรับของ ('+pickups.filter(p=>p.done).length+'/'+pickups.length+')</div>';
    pickups.forEach((pk,i) => {
      const key = 'pk-'+i;
      const checks = localChecks[key] || getPickupChecks().map(()=>false);
      const cnt = checks.filter(Boolean).length;
      const allOk = cnt === getPickupChecks().length;
      const isOpen = openSteps[key];
      const cardCls = pk.done ? 'done' : pk.problem ? 'problem' : cnt > 0 ? 'active' : '';
      const badgeCls = pk.done ? 'badge-done' : pk.problem ? 'badge-problem' : cnt > 0 ? 'badge-active' : 'badge-wait';
      const badgeTxt = pk.done ? 'รับแล้ว' : pk.problem ? 'รอแก้ไข' : cnt > 0 ? 'กำลังทำ' : 'รอ';

      html += '<div class="step-card '+cardCls+'">';
      html += '<div class="step-header" onclick="toggleStep(\''+key+'\')">';
      html += '<div class="step-icon '+(pk.done?'icon-done':pk.problem?'icon-problem':'icon-pickup')+'">'+(pk.done?'✅':pk.problem?'⚠️':'📦')+'</div>';
      html += '<div class="step-info"><div class="step-title">รับของจุดที่ '+(i+1)+'</div><div class="step-sub">'+(pk.items||[]).length+' รายการ • '+(pk.problem?'⚠️ รอแก้ไข':cnt+'/'+getPickupChecks().length+' เช็ค')+(pk.doneAt?' • ✅ '+new Date(pk.doneAt).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}):pk.problemAt?' • ⚠️ '+new Date(pk.problemAt).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}):' ')+'</div></div>';
      html += '<span class="step-badge '+badgeCls+'">'+badgeTxt+'</span>';
      html += '<span style="color:var(--text3);margin-left:6px;font-size:14px">'+(isOpen?'▴':'▾')+'</span>';
      html += '</div>';

      if (isOpen) {
        html += '<div class="step-body open"><div class="step-section">';
        if (pk.location) html += '<a class="map-btn" href="'+pk.location+'" target="_blank">📍 เปิด Google Maps</a>';
        if (pk.note) html += '<div style="font-size:12px;color:var(--amber);background:var(--amber-pale);padding:6px 10px;border-radius:6px;margin-bottom:10px">📝 '+pk.note+'</div>';
        html += '<div class="sec-title">รายการสินค้า</div>';
        (pk.items||[]).forEach(it => {
          html += '<div class="item-row"><span class="item-name">'+translateItem(it.name)+(driverLang==="mm"&&translateItem(it.name)!==it.name?'<br><span style="font-size:10px;opacity:0.6">'+it.name+'</span>':'')+'</span><span class="item-qty">= '+it.qty+(it.src?' <span style="font-size:11px;color:var(--text3);background:var(--bg3);padding:1px 5px;border-radius:8px">'+translateSrc(it.src)+'</span>':'')+'</span></div>';
        });
        html += '<div class="sec-title" style="margin-top:12px">รายการตรวจสอบ</div>';
        getPickupChecks().forEach((ch,ci) => {
          html += '<div class="check-item'+(checks[ci]?' checked':'')+'" onclick="toggleCheck(\''+key+'\','+ci+',\'pickup\')"><div class="checkbox">'+(checks[ci]?'✓':'')+'</div><div class="check-text">'+ch+'</div></div>';
        });
        html += '<div class="prog-mini"><div class="prog-mini-fill" style="width:'+Math.round(cnt/getPickupChecks().length*100)+'%"></div></div>';
        html += '<div class="photo-section"><div class="sec-title">📷 รูปสินค้า</div><div class="photo-grid">';
        getPhotos('pickup',i).forEach((src,pi) => {
          html += '<div class="photo-thumb-wrap"><img src="'+src+'" loading="lazy">'+((!pk.done)?'<button class="photo-remove" onclick="removePhoto(\'pickup\','+i+','+pi+')">✕</button>':'')+'</div>';
        });
        if (!pk.done) html += '<label class="photo-add" for="photo-pk-'+i+'"><span>📷</span><span>เพิ่มรูป</span></label><input class="photo-input" id="photo-pk-'+i+'" type="file" accept="image/*" capture="environment" onchange="addPhoto(\'pickup\','+i+',this)">';
        html += '</div></div>';
        html += '<button class="confirm-btn '+(pk.done?'btn-done':pk.problem?'btn-has-problem':allOk?'btn-ready':'btn-inactive')+'" onclick="'+(pk.done||pk.problem||!allOk?'':'confirmPickup('+i+')')+'">'+( pk.done?'✅ รับของเสร็จแล้ว':pk.problem?'⚠️ แจ้งปัญหาแล้ว':allOk?'✅ ยืนยันรับของ':'ยังไม่ครบทุกรายการ')+'</button>';
        if (pk.done||pk.problem) html += '<button class="btn-undo" onclick="undoStep(\'pickup\','+i+')">↩️ ยกเลิกการยืนยัน</button>';
        if (!pk.done&&!pk.problem) html += '<button class="btn-problem" onclick="showProblem(\'pickup\','+i+')">⚠️ แจ้งปัญหา</button>';
        if (pk.problem) html += '<div style="margin-top:8px;padding:8px 12px;background:var(--red-pale);border-radius:8px;font-size:12px;color:var(--red)">⚠️ '+pk.problem+(pk.problemNote?' — '+pk.problemNote:'')+'</div>';
        html += '</div></div>';
      }
      html += '</div>';
    });
  }

  // Customers
  if (customers.length) {
    html += '<div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;margin:14px 0 8px">🚚 ส่งลูกค้า ('+customers.filter(c=>c.done).length+'/'+customers.length+')</div>';
    customers.forEach((cu,i) => {
      const key = 'cu-'+i;
      const checks = localChecks[key] || getDeliverChecks().map(()=>false);
      const subChoice = localSubChecks[key] || null;
      const cnt = checks.filter(Boolean).length;
      // ข้อ 3 (ลงสินค้า) ต้องเลือก sub-option ด้วย
      const step3checked = checks[3];
      const subOk = !step3checked || (subChoice && (subChoice === 'person' || subChoice === 'equipment'));
      const allOk = cnt === getDeliverChecks().length && subOk;
      const isOpen = openSteps[key];
      const cardCls = cu.done ? 'done' : cu.problem ? 'problem' : cnt > 0 ? 'active' : '';
      const badgeCls = cu.done ? 'badge-done' : cu.problem ? 'badge-problem' : cnt > 0 ? 'badge-active' : 'badge-wait';
      const badgeTxt = cu.done ? 'ส่งแล้ว' : cu.problem ? 'รอแก้ไข' : cnt > 0 ? 'กำลังส่ง' : 'รอ';

      html += '<div class="step-card '+cardCls+'">';
      html += '<div class="step-header" onclick="toggleStep(\''+key+'\')">';
      html += '<div class="step-icon '+(cu.done?'icon-done':cu.problem?'icon-problem':'icon-deliver')+'">'+(cu.done?'✅':cu.problem?'⚠️':'🚚')+'</div>';
      html += '<div class="step-info"><div class="step-title">'+cu.name+'</div><div class="step-sub">'+(cu.items||[]).length+' รายการ • '+(cu.problem?'⚠️ รอแก้ไข':cnt+'/'+getDeliverChecks().length+' เช็ค')+(cu.doneAt?' • ✅ '+new Date(cu.doneAt).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}):' ')+'</div></div>';
      html += '<span class="step-badge '+badgeCls+'">'+badgeTxt+'</span>';
      html += '<span style="color:var(--text3);margin-left:6px;font-size:14px">'+(isOpen?'▴':'▾')+'</span>';
      html += '</div>';

      if (isOpen) {
        html += '<div class="step-body open"><div class="step-section">';
        if (cu.location) html += '<a class="map-btn" href="'+cu.location+'" target="_blank">📍 เปิด Google Maps</a>';
        if (cu.tel) html += '<a class="tel-btn" href="tel:'+cu.tel+'">📞 '+cu.tel+'</a>';
        if (cu.note) html += '<div style="font-size:12px;color:var(--amber);background:var(--amber-pale);padding:6px 10px;border-radius:6px;margin-bottom:10px">📝 '+cu.note+'</div>';
        html += '<div class="sec-title">รายการสินค้า</div>';
        (cu.items||[]).forEach(it => {
          html += '<div class="item-row"><span class="item-name">'+translateItem(it.name)+(driverLang==="mm"&&translateItem(it.name)!==it.name?'<br><span style="font-size:10px;opacity:0.6">'+it.name+'</span>':'')+'</span><span class="item-qty">= '+it.qty+(it.src?' <span style="font-size:11px;color:var(--text3);background:var(--bg3);padding:1px 5px;border-radius:8px">'+translateSrc(it.src)+'</span>':'')+'</span></div>';
        });
        html += '<div class="sec-title" style="margin-top:12px">รายการตรวจสอบ</div>';
        getDeliverChecks().forEach((ch,ci) => {
          html += '<div class="check-item'+(checks[ci]?' checked':'')+'" onclick="toggleCheck(\''+key+'\','+ci+',\'deliver\')"><div class="checkbox">'+(checks[ci]?'✓':'')+'</div><div class="check-text">'+ch+'</div></div>';
          // ข้อ 3 (idx 3) = ลงสินค้า มี sub-option
          if (ci === 3 && checks[ci]) {
            html += '<div class="sub-option'+(subChoice==='person'?' selected':'')+'" onclick="setSubChoice(\''+key+'\',\'person\')"><div class="sub-dot">'+(subChoice==='person'?'✓':'')+'</div><div style="font-size:13px">👷 ใช้คนยกลง</div></div>';
            html += '<div class="sub-option'+(subChoice==='equipment'?' selected':'')+'" onclick="setSubChoice(\''+key+'\',\'equipment\')"><div class="sub-dot">'+(subChoice==='equipment'?'✓':'')+'</div><div style="font-size:13px">🏗️ ใช้อุปกรณ์</div></div>';
          }
        });
        html += '<div class="prog-mini"><div class="prog-mini-fill" style="width:'+Math.round(cnt/getDeliverChecks().length*100)+'%"></div></div>';
        html += '<div class="photo-section"><div class="sec-title">📸 รูปส่งสินค้า</div><div class="photo-grid">';
        getPhotos('customer',i).forEach((src,pi) => {
          html += '<div class="photo-thumb-wrap"><img src="'+src+'" loading="lazy">'+((!cu.done)?'<button class="photo-remove" onclick="removePhoto(\'customer\','+i+','+pi+')">✕</button>':'')+'</div>';
        });

        html += '</div></div>';
        html += '<button class="confirm-btn '+(cu.done?'btn-done':cu.problem?'btn-has-problem':allOk?'btn-ready':'btn-inactive')+'" onclick="'+(cu.done||cu.problem||!allOk?'':'showSig('+i+')')+'">'+( cu.done?'✅ ส่งสำเร็จแล้ว':cu.problem?'⚠️ แจ้งปัญหาแล้ว':allOk?'✍️ ลายเซ็น + ยืนยันส่ง':'ยังไม่ครบทุกรายการ')+'</button>';
        if (cu.done||cu.problem) html += '<button class="btn-undo" onclick="undoStep(\'customer\','+i+')">↩️ ยกเลิกการยืนยัน</button>';
        if (!cu.done&&!cu.problem) html += '<button class="btn-problem" onclick="showProblem(\'customer\','+i+')">⚠️ แจ้งปัญหา</button>';
        if (cu.problem) html += '<div style="margin-top:8px;padding:8px 12px;background:var(--red-pale);border-radius:8px;font-size:12px;color:var(--red)">⚠️ '+cu.problem+(cu.problemNote?' — '+cu.problemNote:'')+'</div>';
        html += '</div></div>';
      }
      html += '</div>';
    });
  }

  if (done === total && total > 0) {
    html += '<div style="text-align:center;padding:24px;background:var(--green-pale);border-radius:var(--radius);border:1px solid var(--green-soft);margin-top:14px"><div style="font-size:40px;margin-bottom:8px">🎉</div><div style="font-size:16px;font-weight:700;color:var(--green2)">เสร็จสิ้นทุกรายการแล้ว!</div><div style="font-size:13px;color:var(--text3);margin-top:4px">ขอบคุณที่ทำงานอย่างดี</div></div>';
  }

  document.getElementById('main').innerHTML = html;
}

// ---- Actions ----
window.toggleStep = key => { openSteps[key] = !openSteps[key]; render(); };

window.toggleCheck = (key, ci, type) => {
  const total = type === 'pickup' ? getPickupChecks().length : getDeliverChecks().length;
  if (!localChecks[key]) localChecks[key] = Array(total).fill(false);
  localChecks[key][ci] = !localChecks[key][ci];
  // ถ้า uncheck ข้อ 3 ของ deliver → reset sub
  if (type === 'deliver' && ci === 3 && !localChecks[key][ci]) localSubChecks[key] = null;
  render();
};

window.setSubChoice = (key, choice) => { localSubChecks[key] = choice; render(); };

// Photos
function compressImg(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        // ย่อขนาดลงมาก เพื่อให้ document ไม่เกิน 1MB
        const maxW = 600;
        const scale = Math.min(1, maxW / img.width);
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        // บีบจนเหลือไม่เกิน 50KB (base64 ~67KB)
        let q = 0.6;
        let data = canvas.toDataURL('image/jpeg', q);
        while (data.length > 65000 && q > 0.1) {
          q = Math.round((q - 0.1) * 10) / 10;
          data = canvas.toDataURL('image/jpeg', q);
        }
        console.log('Photo size:', Math.round(data.length/1024)+'KB, quality:'+q);
        resolve(data);
      } catch(e) {
        URL.revokeObjectURL(url);
        reject(e);
      }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('โหลดรูปไม่ได้')); };
    img.src = url;
  });
}

async function saveImgToFirestore(type, idx, data) {
  // เช็คจำนวนรูปใน subcollection ก่อน
  const photosRef = collection(db,'plans',planId,'photos');
  const existingSnap = await getDocs(photosRef);
  const existing = existingSnap.docs.filter(d => d.data().type===type && d.data().idx===idx);
  if (existing.length >= 6) { showToast('⚠️ เพิ่มได้สูงสุด 6 รูป'); return; }
  // บันทึกรูปเป็น document ย่อยแทน
  await addDoc(photosRef, {
    type, idx, data,
    createdAt: Date.now()
  });
  // อัพเดต photos array ใน document หลักเป็นแค่ marker (ไม่เก็บ base64)
  const snap = await getDoc(doc(db,'plans',planId));
  const latest = snap.data();
  if (type === 'pickup') {
    const pickups = [...latest.pickups];
    pickups[idx] = {...pickups[idx], photoCount: (pickups[idx].photoCount||0)+1};
    await updateDoc(doc(db,'plans',planId), {pickups});
  } else {
    const customers = [...latest.customers];
    customers[idx] = {...customers[idx], photoCount: (customers[idx].photoCount||0)+1};
    await updateDoc(doc(db,'plans',planId), {customers});
  }
}

window.addPhoto = async (type, idx, input) => {
  const files = Array.from(input.files);
  input.value = ''; // reset ให้ถ่ายซ้ำได้
  if (!files.length) return;
  for (const file of files) {
    showToast('⏳ กำลังบันทึกรูป...');
    try {
      const data = await compressImg(file);
      await saveImgToFirestore(type, idx, data);
      showToast('📷 บันทึกรูปแล้ว');
    } catch(e) {
      console.error('Photo error:', e);
      showToast('❌ บันทึกรูปไม่สำเร็จ');
    }
  }
};

window.removePhoto = async (type, idx, pi) => {
  if (!confirm('ลบรูปนี้?')) return;
  // หารูปที่ต้องการลบจาก subcollection
  const photosRef = collection(db,'plans',planId,'photos');
  const existingSnap = await getDocs(photosRef);
  const photos = existingSnap.docs
    .filter(d => d.data().type===type && d.data().idx===idx)
    .sort((a,b) => a.data().createdAt - b.data().createdAt);
  if (photos[pi]) {
    await deleteDoc(doc(db,'plans',planId,'photos',photos[pi].id));
    // อัพเดต photoCount
    const snap = await getDoc(doc(db,'plans',planId));
    const latest = snap.data();
    if (type === 'pickup') {
      const pickups = [...latest.pickups];
      pickups[idx] = {...pickups[idx], photoCount: Math.max(0,(pickups[idx].photoCount||1)-1)};
      await updateDoc(doc(db,'plans',planId), {pickups});
    } else {
      const customers = [...latest.customers];
      customers[idx] = {...customers[idx], photoCount: Math.max(0,(customers[idx].photoCount||1)-1)};
      await updateDoc(doc(db,'plans',planId), {customers});
    }
  }
  showToast('🗑 ลบรูปแล้ว');
};

// Confirm
window.confirmPickup = async idx => {
  const key = 'pk-'+idx;
  const checks = localChecks[key] || getPickupChecks().map(()=>false);
  const pickups = [...plan.pickups];
  pickups[idx] = {...pickups[idx], done:true, doneAt:Date.now(), checkedItems:checks};
  await updateDoc(doc(db,'plans',planId), {pickups});
  openSteps['pk-'+idx] = false;
  showToast('✅ บันทึกการรับของแล้ว');
};

window.confirmDelivery = async idx => {
  const key = 'cu-'+idx;
  const checks = localChecks[key] || getDeliverChecks().map(()=>false);
  const subChoice = localSubChecks[key] || null;
  const customers = [...plan.customers];
  customers[idx] = {...customers[idx], done:true, doneAt:Date.now(), checkedItems:checks, subChoice};
  await updateDoc(doc(db,'plans',planId), {customers});
  openSteps['cu-'+idx] = false;
  showToast('✅ บันทึกการส่งสินค้าแล้ว');
};

window.undoStep = async (type, idx) => {
  if (!confirm('ยกเลิกการยืนยัน?')) return;
  if (type === 'pickup') {
    const pickups = [...plan.pickups];
    pickups[idx] = {...pickups[idx], done:false, doneAt:null, problem:null, problemNote:null, problemAt:null};
    await updateDoc(doc(db,'plans',planId), {pickups});
  } else {
    const customers = [...plan.customers];
    customers[idx] = {...customers[idx], done:false, doneAt:null, problem:null, problemNote:null, problemAt:null};
    await updateDoc(doc(db,'plans',planId), {customers});
  }
  showToast('↩️ ยกเลิกแล้ว');
};

// Problem Modal
window.showProblem = (type, idx) => {
  _problemType = type; _problemIdx = idx; _selectedProblem = null;
  document.getElementById('problem-note').value = '';
  const problems = type === 'pickup'
    ? (driverLang === 'mm' ? PROBLEMS_PICKUP_MM : PROBLEMS_PICKUP_TH)
    : (driverLang === 'mm' ? PROBLEMS_DELIVER_MM : PROBLEMS_DELIVER_TH);
  document.getElementById('problem-options').innerHTML = problems.map((p,i) =>
    '<div class="problem-option" id="popt-'+i+'" onclick="selectProblem('+i+',\''+p.t+'\')"><span style="font-size:20px">'+p.e+'</span><span style="font-size:14px">'+p.t+'</span></div>'
  ).join('');
  document.getElementById('problem-modal').style.display = 'flex';
};
window.selectProblem = (i, text) => {
  _selectedProblem = text;
  document.querySelectorAll('.problem-option').forEach((el,idx) => el.classList.toggle('selected', idx===i));
};
window.closeProblemModal = () => { document.getElementById('problem-modal').style.display = 'none'; };
window.submitProblem = async () => {
  if (!_selectedProblem) { showToast('⚠️ กรุณาเลือกสาเหตุ'); return; }
  const note = document.getElementById('problem-note').value.trim();
  if (_problemType === 'pickup') {
    const pickups = [...plan.pickups];
    pickups[_problemIdx] = {...pickups[_problemIdx], problem:_selectedProblem, problemNote:note, problemAt:Date.now()};
    await updateDoc(doc(db,'plans',planId), {pickups});
  } else {
    const customers = [...plan.customers];
    customers[_problemIdx] = {...customers[_problemIdx], problem:_selectedProblem, problemNote:note, problemAt:Date.now()};
    await updateDoc(doc(db,'plans',planId), {customers});
  }
  closeProblemModal();
  showToast('⚠️ แจ้งปัญหาแล้ว');
};

// Signature
window.showSig = idx => {
  _sigIdx = idx; _sigHasDrawn = false;
  document.getElementById('sig-modal').style.display = 'flex';
  setTimeout(initSig, 100);
};
function initSig() {
  const canvas = document.getElementById('sig-canvas');
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  _sigCtx = canvas.getContext('2d');
  _sigCtx.scale(dpr, dpr);
  _sigCtx.fillStyle = '#fff';
  _sigCtx.fillRect(0, 0, rect.width, rect.height);
  _sigCtx.strokeStyle = '#111';
  _sigCtx.lineWidth = 2.5;
  _sigCtx.lineCap = 'round';
  _sigCtx.lineJoin = 'round';
  const pos = e => { const r = canvas.getBoundingClientRect(); return { x: (e.clientX||e.touches[0].clientX)-r.left, y: (e.clientY||e.touches[0].clientY)-r.top }; };
  const draw = e => {
    if (!_sigDrawing) return;
    const p = pos(e); _sigHasDrawn = true;
    _sigCtx.beginPath(); _sigCtx.moveTo(_sigLastX, _sigLastY); _sigCtx.lineTo(p.x, p.y); _sigCtx.stroke();
    _sigLastX = p.x; _sigLastY = p.y;
  };
  canvas.onmousedown = e => { _sigDrawing=true; const p=pos(e); _sigLastX=p.x; _sigLastY=p.y; };
  canvas.onmousemove = draw;
  canvas.onmouseup = canvas.onmouseleave = () => _sigDrawing = false;
  canvas.ontouchstart = e => { e.preventDefault(); _sigDrawing=true; const p=pos(e); _sigLastX=p.x; _sigLastY=p.y; };
  canvas.ontouchmove = e => { e.preventDefault(); draw(e); };
  canvas.ontouchend = () => _sigDrawing = false;
}
window.clearSig = () => {
  const canvas = document.getElementById('sig-canvas');
  const rect = canvas.getBoundingClientRect();
  _sigCtx.fillStyle = '#fff'; _sigCtx.fillRect(0, 0, rect.width, rect.height);
  _sigHasDrawn = false;
};
window.cancelSig = () => { document.getElementById('sig-modal').style.display = 'none'; };
window.confirmSig = async () => {
  if (!_sigHasDrawn) { showToast('⚠️ กรุณาให้ลูกค้าเซ็นชื่อก่อน'); return; }

  // ครอปเฉพาะพื้นที่ที่มีลายเซ็น (ตัดพื้นที่ว่างออก)
  const sigCanvas = document.getElementById('sig-canvas');
  const ctx = sigCanvas.getContext('2d');
  const w = sigCanvas.width, h = sigCanvas.height;
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;

  let minX=w, minY=h, maxX=0, maxY=0;
  for (let y=0; y<h; y++) {
    for (let x=0; x<w; x++) {
      const idx = (y*w+x)*4;
      // หาพิกเซลที่ไม่ใช่ขาว (มีลายเซ็น)
      if (data[idx]<240 || data[idx+1]<240 || data[idx+2]<240) {
        if (x<minX) minX=x; if (x>maxX) maxX=x;
        if (y<minY) minY=y; if (y>maxY) maxY=y;
      }
    }
  }

  let sigData;
  if (maxX > minX && maxY > minY) {
    // ครอปและเพิ่ม padding
    const pad = 20;
    const cx = Math.max(0, minX-pad), cy = Math.max(0, minY-pad);
    const cw = Math.min(w-cx, maxX-minX+pad*2+1);
    const ch = Math.min(h-cy, maxY-minY+pad*2+1);
    const cropCanvas = document.createElement('canvas');
    cropCanvas.width = cw; cropCanvas.height = ch;
    const cropCtx = cropCanvas.getContext('2d');
    cropCtx.fillStyle = '#fff';
    cropCtx.fillRect(0, 0, cw, ch);
    cropCtx.drawImage(sigCanvas, cx, cy, cw, ch, 0, 0, cw, ch);
    sigData = cropCanvas.toDataURL('image/jpeg', 0.7);
  } else {
    sigData = sigCanvas.toDataURL('image/jpeg', 0.5);
  }

  document.getElementById('sig-modal').style.display = 'none';
  showToast('⏳ กำลังบันทึก...');
  try {
    await saveImgToFirestore('customer', _sigIdx, sigData);
    await confirmDelivery(_sigIdx);
  } catch(e) { showToast('❌ '+e.message); }
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/stkmetal/sw.js').catch(() => {});
}
</script>
